<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <button
        id="theme-toggle"
        onclick="toggleTheme()"
        aria-label="Alternar tema"
      ></button>
      <h1>Quem está assistindo?</h1>
      <section aria-label="Perfis de usuário disponíveis">
        <ul class="profiles">
          <li>
            <a href="catalogo/catalogo.html" class="profile">
              <figure>
                <img
                  src="/assets/perfil-1.png"
                  alt="Ilustração de um personagem em estilo stop-motion de Tim Burton, vestindo cartola e casaco roxo em um cenário gótico com velas e quadros."
                />
                <figcaption>Gustavo</figcaption>
              </figure>
            </a>
          </li>
          <li>
            <a href="catalogo/catalogo.html" class="profile">
              <figure>
                <img src="/assets/perfil-2.png" alt="Imagem de um boné azul" />
                <figcaption>Thiago</figcaption>
              </figure>
            </a>
          </li>
          <li>
            <a href="catalogo/catalogo.html" class="profile">
              <figure>
                <img
                  src="/assets/perfil-3.png"
                  alt="Ilustração de um personagem em estilo de fantasia"
                />
                <figcaption>Vini</figcaption>
              </figure>
            </a>
          </li>
          <li>
            <a href="catalogo/catalogo.html" class="profile">
              <figure>
                <img
                  src="/assets/perfil-4.png"
                  alt="Ilustração de um personagem em estilo de Dorama Coreano"
                />
                <figcaption>Thamiris</figcaption>
              </figure>
            </a>
          </li>
        </ul>
      </section>
    </main>
    <script src="js/index.js"></script>
    <script src="js/theme.js"></script>
  </body>
</html>
